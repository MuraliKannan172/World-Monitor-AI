<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldMonitor AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body x-data="worldMonitor()" x-init="init()">

<!-- Top bar -->
<div id="topbar">
  <span class="logo">WorldMonitor AI</span>
  <div class="topbar-actions">
    <button class="btn" :class="{ active: mapMode === '2d' }" @click="setMapMode('2d')">2D Map</button>
    <button class="btn" :class="{ active: mapMode === '3d' }" @click="setMapMode('3d')">3D Globe</button>
    <span class="btn" x-text="'Events: ' + eventCount" style="cursor:default;"></span>
    <button class="btn" :class="{ active: clockOpen }" @click="clockOpen = !clockOpen">&#x1F310; World Clock</button>
  </div>
</div>

<!-- World Clock Panel (dropdown below topbar) -->
<div id="clock-panel" class="glass" x-show="clockOpen" x-cloak>
  <div class="clock-grid">
    <template x-for="zone in clockZones" :key="zone.tz">
      <div class="clock-card glass">
        <div class="clock-city" x-text="zone.label"></div>
        <div class="clock-time" x-text="zone.time"></div>
        <div class="clock-date" x-text="zone.date"></div>
        <div class="clock-tz" x-text="zone.tz"></div>
      </div>
    </template>
  </div>
  <div class="clock-add-row">
    <select x-model="customTz" class="clock-tz-select">
      <option value="">Add timezone…</option>
      <template x-for="tz in availableTimezones" :key="tz.tz">
        <option :value="tz.tz" x-text="tz.label"></option>
      </template>
    </select>
    <button class="btn" @click="addClockZone()" :disabled="!customTz">Add</button>
  </div>
</div>

<!-- Ollama banner -->
<div id="ollama-banner" x-show="ollamaDown" x-cloak>
  Ollama not detected. Start with <code>ollama serve</code> and pull a model:
  <code>ollama pull qwen2.5:7b</code>
</div>

<!-- Main layout -->
<div id="layout">

  <!-- Sidebar / Layer Panel -->
  <div id="sidebar" class="glass">
    <div class="layer-panel-head">
      <span>Map Layers</span>
      <span class="layer-count-badge" x-text="activeLayerCount + ' on'"></span>
    </div>
    <div class="layer-scroll">
      <template x-for="group in layerGroups" :key="group">
        <div class="layer-group-section">
          <div class="layer-group-title" x-text="group"></div>
          <template x-for="layer in layersByGroup(group)" :key="layer.id">
            <button class="layer-toggle-btn"
              :class="{active: activeLayers[layer.id]}"
              @click="toggleLayer(layer.id)">
              <span x-text="layer.icon"></span>
              <span x-text="layer.label"></span>
            </button>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Map canvas -->
  <div id="map-panel" class="glass">
    <iframe id="map-frame" :src="mapSrc" title="Event map"></iframe>
  </div>

  <!-- Chat panel -->
  <div id="chat-panel" class="glass">
    <div class="chat-header">
      <h3>AI Analyst</h3>
      <button class="btn btn-sm" @click="clearChat()" title="New session">&#x21BA; Clear</button>
    </div>

    <select id="model-select" class="glass" x-model="selectedModel">
      <template x-for="m in models" :key="m">
        <option :value="m" x-text="m"></option>
      </template>
      <option value="" x-show="models.length === 0">No models available</option>
    </select>

    <div id="chat-messages" x-ref="chatMessages">
      <template x-for="(msg, i) in chatHistory" :key="i">
        <div class="msg" :class="msg.role" x-html="msg.content"></div>
      </template>
      <div class="typing-indicator msg assistant" x-show="streaming && !streamingText">
        <span></span><span></span><span></span>
      </div>
      <div class="msg assistant streaming" x-show="streaming && streamingText" x-text="streamingText"></div>
    </div>

    <div id="quick-questions">
      <template x-for="q in quickQuestions" :key="q.label">
        <button class="quick-q" :disabled="streaming" @click="askQuick(q.prompt)" x-text="q.label"></button>
      </template>
    </div>

    <div id="chat-input-row">
      <textarea id="chat-input" placeholder="Ask about world events…" x-model="chatInput"
        @keydown="handleKeydown($event)"
        @input="autoGrowTextarea($event)"
        :disabled="streaming"></textarea>
      <button id="send-btn" @click="sendChat()" :disabled="streaming || !chatWsReady">Send</button>
    </div>
    <div class="chat-hint">↵ Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

</div>

<!-- Event feed -->
<div id="feed-section">
  <div id="feed-header">
    <div class="live-dot"></div>
    <h3>Live Event Feed</h3>
  </div>
  <div id="event-cards">
    <template x-for="ev in events" :key="ev.id">
      <a class="event-card glass new-event-flash" :href="ev.link" target="_blank" rel="noopener">
        <div class="card-title" x-text="ev.title"></div>
        <div class="card-meta">
          <span x-text="ev.source_name"></span>
          &nbsp;&bull;&nbsp;
          <span x-text="(ev.country || '—')"></span>
          &nbsp;&bull;&nbsp;
          <span x-text="formatDate(ev.published_at)"></span>
        </div>
        <div class="sev-bar" :style="severityBarStyle(ev.severity)"></div>
      </a>
    </template>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
